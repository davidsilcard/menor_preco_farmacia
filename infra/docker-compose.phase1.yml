name: pricing-core-phase1

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-precos-farmacia}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - pricing-core-postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-precos-farmacia}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  pricing-core-api:
    build:
      context: ../services/pricing-core
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      EMBED_OPERATION_WORKER: "false"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  pricing-core-worker:
    build:
      context: ../services/pricing-core
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "src.worker_main"]
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      EMBED_OPERATION_WORKER: "false"
    depends_on:
      postgres:
        condition: service_healthy

  pricing-core-scheduler:
    build:
      context: ../services/pricing-core
      dockerfile: Dockerfile
    command: ["uv", "run", "python", "-m", "src.scheduler_main"]
    profiles: ["manual"]
    env_file:
      - ../.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      EMBED_OPERATION_WORKER: "false"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pricing-core-postgres:
